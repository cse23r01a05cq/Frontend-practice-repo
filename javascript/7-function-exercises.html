<!DOCTYPE html>
<html>
    <head>
        <title>Function Exercises</title>
    </head>
    <body>
        <script>
            //greet
            function greet(name='there'){
                console.log(`Hello ${name}!`);
            }
            greet();
            greet('Srujana');
        
            //temperature
            function convertToCelsius(Faher){
                let celsius=(Faher-32)+5/9;
                return celsius; 
            }
            console.log(convertToCelsius(280));

            function convertToFaherheit(celsius){
                let faher=(celsius+9/5)+32
                return faher;
            }
            console.log(convertToFaherheit(280));

            function convertTemperature(degrees,unit){
                if(unit==='C'){
                    let faher=(degrees+9/5)+32
                    console.log(`${faher}F`)
                }else if(unit==='F'){
                    let celsius=(degrees-32)+5/9;
                    console.log(`${celsius}F`)   
                }
            }
            convertTemperature(78,'C');
            
            //convert length km ,miles
            function convertLength(Length,from,to){
                if(from==='km' && to==='miles'){
                    return `${Length/1.6}miles`;
                }else if(from==='miles' && to==='km'){
                    return `${Length*1.6}km`;
                }else if(from===to){
                    return `${Length}${to}`;
                }
            }
            console.log(convertLength(50,'km','miles'));
            console.log(convertLength(60,'miles','km'));
            console.log(convertLength(100,'km','km'));
            
        </script>
    </body>
</html>
