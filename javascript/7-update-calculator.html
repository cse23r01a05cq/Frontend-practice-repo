<!DOCTYPE html>
<html>
    <head>
        <title>Calculator</title>
    </head>
    <body>
        <p> Calculator</p>
        <p>
            <button onclick="
                updateCalculation(1);
                ">1</button>
            <button onclick="
                updateCalculation(2);
                ">2</button>
            <button onclick="
                updateCalculation(3);
                ">3</button>
            <button onclick="
                updateCalculation('+');
                ">+</button>
        </p>
        <p>
            <button onclick="
                updateCalculation(4);
                ">4</button>
            <button onclick="
                updateCalculation(5);
                ">5</button>
            <button onclick="
                updateCalculation(6);
                ">6</button>
            <button onclick="
                updateCalculation('-');
                ">-</button>
        </p>
        <p>
            <button onclick="
                updateCalculation(7);
                ">7</button>
            <button onclick="
                updateCalculation(8);
                ">8</button>
            <button onclick="
                updateCalculation(9);
                ">9</button>
            <button onclick="
                updateCalculation('*');
                ">*</button>
        </p>
        <p>
            <button onclick="
                updateCalculation(0);
                ">0</button>
            <button onclick="
                updateCalculation('.');
                ">.</button>
            <button onclick="
                calculations=eval(calculations);
                console.log(calculations);
                ">=</button>
            <button onclick="
                updateCalculation('/');
                ">/</button>
        </p>
        <button onclick="
                calculations='';
                console.log('Cleared');
                ">Clear</button>
        <script>
           let calculations='';
           function updateCalculation(Oper){
                calculations+=Oper;
                console.log(calculations);


           }
        </script>
    </body>
</html>
