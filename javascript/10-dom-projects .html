<!DOCTYPE html>
<html>
    <head>
        <title>Dom projects</title>
        <style>
            body{
                font-family: arial;
            }
            .subscribe-btn{
                border: none;
                background-color: black;
                color: white;
                padding: 10px 15px;
                border-radius: 20px;
                font-weight: bold;
                cursor: pointer;
                margin-bottom: 30px;

            }
            .is-subscribed{
                background-color: rgb(240, 240, 240);
                color:black;
            }
            .cost-input{
                padding: 10px ;
                font-size: 15px;
                border-width: 1px;
            }
            .calculate-btn{
                border:none;
                background-color: green;
                color:white;
                padding: 11px 10px;
                font-size: 15px;
                cursor: pointer;
            }
           
        </style>
    </head>
    <body>

        <p>YouTube Subscribe Button</p>
        

        <button onclick="
            subscribe();
        " class="js-sub-btn subscribe-btn">Subscribe</button>


        <p>Amazon Shipping Calculator</p>
        <p>Orders under $40=+$10 shipping.</p>
        <p>Orders over $40=FREE shipping.</p>

        <input 
            placeholder="Cost of product"
            class="js-cost-btn cost-input"
            onkeydown="
                handleCostKey(event);
            ">

        <button onclick="
            CalculateTotal();
        " class="calculate-btn">Calculate</button>

        <p class="js-total-cost"></p>

        <script>

            function handleCostKey(event){
                if(event.key === 'Enter'){
                    CalculateTotal();
                }
            }

            function CalculateTotal(){

                const inputElement = document.querySelector('.js-cost-btn');

                let cost = Number(inputElement.value);

                if(cost < 40){
                    cost = cost + 10;
                }

                document.querySelector('.js-total-cost')
                    .innerHTML = `$${cost}`;
            }

            function subscribe(){

                const btnElement = document.querySelector('.js-sub-btn');

                if(btnElement.innerHTML === 'Subscribe'){
                    btnElement.innerHTML = 'Subscribed';
                    btnElement.classList.add('is-subscribed')
                } else {
                    btnElement.innerHTML = 'Subscribe';
                    btnElement.classList.remove('is-subscribed');
                }

            }

        </script>

    </body>
</html>
