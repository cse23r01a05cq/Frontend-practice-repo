<!DOCTYPE html>
<html>
    <head>
        <title>Variables</title>
    </head>
    <body>
        <script>
            let var1=3;
            console.log(var1);
            let cal=2+2;
            console.log(cal);
            let message='hello';
            console.log(message);
            var1=5;
            console.log(var1);
            const var2=0;
            console.log(typeof var2);
        </script>
    </body>
</html>
