<!DOCTYPE html>
<html>
    <head>
        <title>Dom projects</title>
    </head>
    <body>

        <p>YouTube Subscribe Button</p>

        <button onclick="
            subscribe();
        " class="js-sub-btn">Subscribe</button>

        <p>Rock Paper Scissors</p>

        <p>Amazon Shipping Calculator</p>

        <input 
            placeholder="Cost of product"
            class="js-cost-btn"
            onkeydown="
                handleCostKey(event);
            ">

        <button onclick="
            CalculateTotal();
        ">Calculate</button>

        <p class="js-total-cost"></p>

        <script>

            function handleCostKey(event){
                if(event.key === 'Enter'){
                    CalculateTotal();
                }
            }

            function CalculateTotal(){

                const inputElement = document.querySelector('.js-cost-btn');

                let cost = Number(inputElement.value);

                if(cost < 40){
                    cost = cost + 10;
                }

                document.querySelector('.js-total-cost')
                    .innerHTML = `$${cost}`;
            }

            function subscribe(){

                const btnElement = document.querySelector('.js-sub-btn');

                if(btnElement.innerHTML === 'Subscribe'){
                    btnElement.innerHTML = 'Subscribed';
                } else {
                    btnElement.innerHTML = 'Subscribe';
                }

            }

        </script>

    </body>
</html>
