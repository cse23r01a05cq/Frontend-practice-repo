<!DOCTYPE html>
<html>

<head>
    <title>5g Challenge</title>

    <style>
        p {
            font-family: Arial;
            margin-top: 0;
            margin-bottom: 0;
        }

        .name {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 8px;
        }

        .username {
            color: gray;
            font-weight: normal;
        }

        .tweet {
            width: 550px;
            line-height: 28px;
            font-size: 18px;
            margin-bottom: 25px;
        }

        .tag {
            color: rgb(29, 155, 240);
        }
    </style>
</head>

<body>

    <p class="name">
        freeCodeCamp.org
        <span class="username">@freeCodeCamp 1h</span>
    </p>

    <p class="tweet">
        As a web developer, you'll want to make your projects easy to use and navigate around.
    </p>

    <p class="tweet">
        Here
        <span class="tag">@chp_it</span>
        outlines the top skills new developers should have.
    </p>

</body>

</html>
