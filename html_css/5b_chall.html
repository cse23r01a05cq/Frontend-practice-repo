<!DOCTYPE html>
<html>

<head>
    <title>5f Exercise</title>

    <style>
        p {
            font-family: Arial;
            margin-top: 0;
            margin-bottom: 0;
        }

        .price {
            font-size: 40px;
            margin-bottom: 8px;
        }

        .currency {
            font-size: 20px;
            color: gray;
        }

        .today {
            color: green;
            margin-bottom: 8px;
        }

        .after-hours {
            color: gray;
        }

        .loss {
            color: red;
        }
    </style>
</head>

<body>

    <p class="price">
        1,049.61
        <span class="currency">USD</span>
    </p>

    <p class="today">
        +18.05 (1.75%) today
    </p>

    <p class="after-hours">
        After hours 1,048.00
        <span class="loss">-1.61 (0.15%)</span>
    </p>

</body>

</html>
